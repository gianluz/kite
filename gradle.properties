# Force Gradle to run with JDK 21 (JDK 26 preview is not supported by Gradle/Kotlin yet)
org.gradle.java.home=/Library/Java/JavaVirtualMachines/temurin-21.jdk/Contents/Home
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true
org.gradle.caching=true
# Toolchain auto-download
org.gradle.java.installations.auto-download=true
kotlin.compiler.execution.strategy=in-process
# Configuration cache for faster builds (Gradle 9.2+)
org.gradle.configuration-cache=true
org.gradle.configuration-cache.problems=warn
